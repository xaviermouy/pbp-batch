---
time:
  standard_name: time
  long_name: UTC time beginning each 1-minute temporal bin
  units: seconds since 1970-01-01T00:00:00Z
  coverage_content_type: coordinate
effort:
  long_name: Duration of input data available for each 1-minute bin
  coverage_content_type: qualityInformation
  units: seconds
frequency:
  standard_name: sound_frequency
  long_name: Center frequency of hybrid millidecade spectral bands
  units: Hz
  coverage_content_type: coordinate
psd:
  standard_name: sound_intensity_in_water
  long_name: Single-sided mean-square sound pressure spectral density (dB re 1 µPa^2/Hz)
  units: dB
  coverage_content_type: physicalMeasurement
  comment: >-
    Computation followed ISO 18405 3.1.3.13.
sensitivity:
  long_name: Hydrophone sensitivity (dB re 1 volt / µPa)
  units: dB
  coverage_content_type: physicalMeasurement
  comment: >-
    As specified in the user manual, the SoundTrap 300, 400, and 600 hydrophone integrates the recorder and hydrophone in a single package, and the relationship between sound pressure and the resultant wav file data is fixed. A single calibration value is used to compute a converstion factor (10^[cal/20]) that is multiplied by wav data to convert to µPa.
quality_flag:
  long_name: Quality flag for hybrid millidecade band sound pressure levels
  flag_values: 1 2 3 4 9
  flag_meanings: good not_evaluated suspect bad missing
  valid_min: 1
  valid_max: 9
  coverage_content_type: qualityInformation
  comment: >-
    Quality flag following QARTOD conventions: 1=Good, 2=Not evaluated,
    3=Suspect, 4=Bad, 9=Missing.
  references: https://cdn.ioos.noaa.gov/media/2017/12/QARTOD_PassiveAcousticsManual_Final_V1.0_signed.pdf
