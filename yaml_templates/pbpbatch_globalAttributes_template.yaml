title: >-
    Hybrid Millidecade Band Sound Pressure Levels Computed at 1 Minute Resolution from Oceanic Passive Acoustic Monitoring Recordings
Summary: >- 
    To understand natural and anthropogenic sound in the ocean, and to compare underwater soundscapes globally, standard methods of analysis must be applied to passive acoustic monitoring (PAM) data. Methods that balance constrained volume and adequate resolution of acoustic spectra have recently been published (Martin et al., 2021a,b). A community effort supported by NOAA, BOEM, U.S. Navy, and ONR was initiated to apply these methods to PAM datasets from around the world. This record represents the hybrid millidecade band (HMB) spectra of sound levels derived from calibrated PAM data.
Conventions: COARDS, CF-1.6, ACDD-1.3
keywords: >-
  oceans, ocean acoustics, ambient noise, intensity, marine environment monitoring,
  marine habitat, sound_intensity_level_in_water, soundscapes
keywords_vocabulary: GCMD Science Keywords
history: >- 
  Original hybrid millidecade spectra were produced by the NOAA Northeast Fisheries Science Center. 
source: >-
  Data analysis was performed using Python Passive Acoustic Monitoring (PyPAM) software, version {{PyPAM_version}}, to produce hybrid millidecade band (HMB) spectra of sound levels from oceanic audio recordings.  Processing followed the methods defined in Martin et al. (2021a,b).  Input wav data were computed to µPa, and power spectral density (PSD) levels were computed from 1-minute segments of audio data using Welch's method.  By applying fast Fourier transform (FFT) with length equal to the sample rate, using Hann window and 50% overlap, PSD estimates (µPa^2/Hz) were computed with a frequency resolution of 1 Hz and a temporal resolution of 1 second. The 119 PSD estimates from each 1-minute segment were averaged, and the average spectrum for each minute was further processed to an HMB spectrum following Martin et al. (2021b). 
  PSD estimates (V^2/Hz) for each 1-minute segment processed to an HMB spectrum following Martin et al. and then each 1-minute spectrum (dB re V^2/Hz) was calibrated using the frequency-dependent hydrophone sensitivity (dB re V/µPa) data to obtain calibrated PSD (dB re 1 µPa^2/Hz).
